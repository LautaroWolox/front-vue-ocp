name: Validate imported vuetipito UI

on:
  pull_request:
    branches:
      - agent/import-vuetipito-ui

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout imported branch
        uses: actions/checkout@v4
        with:
          ref: agent/import-vuetipito-ui
          fetch-depth: 0

      - name: Install dependencies
        run: npm ci

      - name: Capture build output
        id: build
        shell: bash
        run: |
          set +e
          npm run build > migration-build-output.txt 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit build diagnostics
        shell: bash
        run: |
          printf '%s\n' "${{ steps.build.outputs.exit_code }}" > migration-build-exit-code.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f migration-build-output.txt migration-build-exit-code.txt
          git commit -m "chore: capture imported UI build diagnostics"
          git push origin HEAD:agent/import-vuetipito-ui
